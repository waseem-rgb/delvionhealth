version: "3.9"

# Production overrides — use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

  app-api:
    build:
      target: production
    environment:
      NODE_ENV: production
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  app-web:
    build:
      target: production
    environment:
      NODE_ENV: production
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: delvion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app-api
      - app-web
    networks:
      - delvion-network
